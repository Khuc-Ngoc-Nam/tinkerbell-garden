services:
  db:
    image: mysql:8.4
    container_name: tinkerbell_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: tinkerbellgarden
    volumes:
      - tinkerbell_mysql:/var/lib/mysql
      - ./server/database.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    container_name: tinkerbell_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      DB_NAME: tinkerbellgarden
      DB_PORT: 3306
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-before-production}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - ./server/public/uploads:/app/public/uploads
    command: npm start

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
    container_name: tinkerbell_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  tinkerbell_mysql:
